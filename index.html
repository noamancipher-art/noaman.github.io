<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOAMAN | Mystery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Noto+Sans+Arabic:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #050505;
            color: #e0e0e0;
            font-family: 'Noto Sans Arabic', sans-serif;
            overflow-x: hidden;
        }
        .faded-text { color: rgba(255, 255, 255, 0.1); }
        .glass-card {
            background: rgba(15, 15, 15, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-10px);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.05);
        }
        .scary-void {
            background: linear-gradient(180deg, #050505 0%, #000 100%);
            animation: pulse-void 4s infinite;
        }
        @keyframes pulse-void {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 0.4; }
        }
        #intro-overlay {
            background: #000;
            transition: opacity 1.5s ease-in-out;
        }
    </style>
</head>
<body>

    <div id="intro-overlay" class="fixed inset-0 z-[100] flex flex-col items-center justify-center text-center p-6">
        <h2 class="text-blue-500 text-sm tracking-[0.5em] mb-4 animate-pulse uppercase font-bold">Initiating</h2>
        <h1 class="text-3xl md:text-5xl font-bold mb-4">أهلاً بك يا صديقي أسامة بولويز</h1>
        <p class="text-gray-500 italic">"من صديقك الذي لا أصدقاء له في الأصل.."</p>
        <button onclick="enterSite()" class="mt-12 border border-gray-800 px-10 py-2 hover:bg-white hover:text-black transition duration-700">دخول العزلة</button>
    </div>

    <div class="fixed inset-0 flex items-center justify-center pointer-events-none select-none">
        <h1 class="text-[15vw] font-black faded-text uppercase tracking-widest">NOAMAN</h1>
    </div>

    <div class="relative z-10 container mx-auto px-6 min-h-screen flex flex-col justify-center py-20">
        
        <div class="grid md:grid-cols-3 gap-8 items-stretch">
            
            <div onclick="showQuote(0)" class="glass-card p-12 rounded-none cursor-pointer text-center flex flex-col justify-center min-h-[400px]">
                <span class="text-xs text-blue-900 mb-6 tracking-widest">I. ISOLATION</span>
                <p id="quote-0" class="text-xl font-light leading-relaxed">البشر كائنات مزعجة..</p>
            </div>

            <div onclick="showQuote(1)" class="glass-card p-12 rounded-none cursor-pointer text-center flex flex-col justify-center min-h-[400px]">
                <span class="text-xs text-red-900 mb-6 tracking-widest">II. EGO</span>
                <p id="quote-1" class="text-xl font-light leading-relaxed">أنا.. ثم أنا.. ثم أخيراً أنا.</p>
            </div>

            <div onclick="showQuote(2)" class="glass-card scary-void p-12 rounded-none cursor-pointer text-center flex flex-col justify-center min-h-[400px] border-none shadow-inner">
                <span class="text-xs text-gray-800 mb-6 tracking-widest">III. VOID</span>
                <p id="quote-2" class="text-xl font-light text-gray-900"></p>
            </div>

        </div>
    </div>

    <script>
        function enterSite() {
            document.getElementById('intro-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro-overlay').classList.add('hidden');
            }, 1500);
        }

        const quotes = [
            // Isolation (50 sentences placeholder logic)
            Array.from({length: 50}, (_, i) => `العزلة هي الحل الوحيد لأن البشر كائنات مزعجة #${i+1}`),
            // Ego (50 sentences placeholder logic)
            Array.from({length: 50}, (_, i) => `أنا ثم أنا ثم أخيراً أنا.. لا أحد غيري يهم #${i+1}`),
            // Void (50 empty/scary sentences)
            Array.from({length: 50}, (_, i) => `... ${" ".repeat(i)}`)
        ];

        // Customizing some real sentences as examples
        quotes[0][0] = "الزحام يسرق الروح، والوحدة تعيد بناءها.";
        quotes[0][1] = "البشر يتحدثون كثيراً، لكنهم لا يقولون شيئاً.";
        quotes[1][0] = "في مملكتي الخاصة، أنا الملك والشعب والقانون.";
        quotes[1][1] = "العالم يدور حولي، البقية مجرد ديكور.";
        quotes[2][0] = "هل تسمع صوت الصمت؟";
        quotes[2][1] = "هنا لا يوجد شيء.. حتى أنت غير موجود.";

        function showQuote(index) {
            const display = document.getElementById(`quote-${index}`);
            const randomQuote = quotes[index][Math.floor(Math.random() * quotes[index].length)];
            
            display.style.opacity = 0;
            setTimeout(() => {
                display.innerText = randomQuote;
                display.style.opacity = 1;
            }, 200);
        }
    </script>
</body>
</html>
